<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testigos — Coordinación Electoral</title>
<link rel="stylesheet" href="css/styles.css">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body style="display:flex;flex-direction:column;height:100vh;overflow:hidden">
<!-- Auth-gate overlay: visible hasta que authReady resuelva -->
<div id="auth-gate-overlay">
  <div class="auth-gate-inner">
    <div class="spinner"></div>
    <p>Verificando sesión…</p>
  </div>
</div>
<div class="topbar">
  <div class="logo">
    <a href="/" style="color:var(--t2);text-decoration:none;font-size:12px;font-weight:600;margin-right:12px">← Dashboard</a>
    <div class="logo-main">🧾 <em>Gestión de Testigos</em></div>
    <div class="logo-sub">Coordinación Electoral · Defensores de la Patria 2026</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <button class="export-btn" onclick="clearReferenceCache();this.textContent='✓ Caché limpiada';setTimeout(()=>this.textContent='🗑 Limpiar caché',2000)" title="Borra el caché local de municipios, puestos y zonas" style="white-space:nowrap">🗑 Limpiar caché</button>
    <div class="user-badge" id="user-badge" onclick="doLogout()">
      <span>👤</span><span id="user-label"></span><span style="font-size:9px;color:var(--red)">Salir</span>
    </div>
  </div>
</div>
<div id="page-content" style="flex:1;overflow:auto;display:flex;flex-direction:column">
  <p style="color:var(--t3);font-size:13px;padding:40px;text-align:center">Verificando acceso…</p>
</div>
<script src="js/firebase-init.js"></script>
<script src="js/auth-gate.js"></script>
<script src="js/api.js"></script>
<script>function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}</script>
<div id="profile-widget"></div>
<script src="js/auth.js"></script>
<script src="js/testigos-page.js?v=20260620b"></script>
<script src="js/profile-widget.js"></script>
</body>
</html>
