steps:
  - name: 'gcr.io/cloud-builders/docker'
    dir: 'backend'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/coordinacion-electoral/defensores/backend:$SHORT_SHA'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/coordinacion-electoral/defensores/backend:$SHORT_SHA'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'backend'
      - '--image'
      - 'us-central1-docker.pkg.dev/coordinacion-electoral/defensores/backend:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--project'
      - 'coordinacion-electoral'

images:
  - 'us-central1-docker.pkg.dev/coordinacion-electoral/defensores/backend:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
